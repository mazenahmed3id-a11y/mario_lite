<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Adventure Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
}

canvas{
display:block;
margin:auto;
background:#87CEEB;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

canvas.width = 1280;
canvas.height = 720;

let gravity = 0.6;

let score = 0;

let hearts = 3;

let level = 1;

let gameWon = false;

let worldWidth = 5000;

let cameraX = 0;

let player = {

x:100,
y:300,

w:45,
h:65,

dx:0,
dy:0,

speed:6,

jumpPower:-14,

jumps:2,

maxJumps:2

};

let keys = {};

document.addEventListener(
"keydown",
e=>{

keys[e.key]=true;

if(
e.code==="Space" &&
player.jumps>0
){

player.dy =
player.jumpPower;

player.jumps--;

}

}
);

document.addEventListener(
"keyup",
e=>{

keys[e.key]=false;

}
);

function loadLevel1(){

worldWidth = 5000;

platforms = [

{x:0,y:620,w:1000,h:100},
{x:1100,y:560,w:220,h:20},
{x:1450,y:500,w:220,h:20},
{x:1800,y:430,w:220,h:20},
{x:2200,y:370,w:220,h:20},
{x:2600,y:450,w:220,h:20},
{x:3000,y:350,w:220,h:20},
{x:3400,y:280,w:220,h:20},
{x:3800,y:420,w:220,h:20},
{x:4200,y:300,w:220,h:20}

];

coins = [

{x:1150,y:520,taken:false},
{x:1500,y:460,taken:false},
{x:1850,y:390,taken:false},
{x:2250,y:330,taken:false},
{x:2650,y:410,taken:false},
{x:3050,y:310,taken:false},
{x:3450,y:240,taken:false},
{x:3850,y:380,taken:false},
{x:4250,y:260,taken:false}

];

turtles = [

{x:900,y:585,w:50,h:35,dir:1},
{x:2400,y:335,w:50,h:35,dir:-1},
{x:3900,y:385,w:50,h:35,dir:1}

];

finish = {
x:4700,
y:520,
w:50,
h:100
};

}

let platforms = [];
let coins = [];
let turtles = [];
let finish = {};

loadLevel1();
function loadLevel2(){

worldWidth = 6500;

platforms = [

{x:0,y:620,w:1200,h:100},
{x:1400,y:520,w:180,h:20},
{x:1800,y:430,w:180,h:20},
{x:2300,y:340,w:180,h:20},
{x:2800,y:470,w:180,h:20},
{x:3300,y:320,w:180,h:20},
{x:3800,y:250,w:180,h:20},
{x:4300,y:400,w:180,h:20},
{x:5000,y:280,w:180,h:20}

];

coins = [

{x:1450,y:470,taken:false},
{x:1850,y:380,taken:false},
{x:2350,y:290,taken:false},
{x:2850,y:420,taken:false},
{x:3350,y:270,taken:false},
{x:3850,y:200,taken:false},
{x:4350,y:350,taken:false},
{x:5050,y:230,taken:false}

];

turtles = [

{x:1600,y:485,w:50,h:35,dir:1},
{x:3200,y:285,w:50,h:35,dir:-1},
{x:4700,y:365,w:50,h:35,dir:1}

];

finish = {
x:6200,
y:520,
w:50,
h:100
};

}

function loadLevel3(){

worldWidth = 8000;

platforms = [

{x:0,y:620,w:1000,h:100},
{x:1300,y:520,w:120,h:20},
{x:1700,y:420,w:120,h:20},
{x:2100,y:320,w:120,h:20},
{x:2600,y:220,w:120,h:20},
{x:3200,y:350,w:120,h:20},
{x:3800,y:250,w:120,h:20},
{x:4500,y:180,w:120,h:20},
{x:5300,y:320,w:120,h:20},
{x:6200,y:220,w:120,h:20}

];

coins = [

{x:1320,y:480,taken:false},
{x:1720,y:380,taken:false},
{x:2120,y:280,taken:false},
{x:2620,y:180,taken:false},
{x:3220,y:310,taken:false},
{x:3820,y:210,taken:false},
{x:4520,y:140,taken:false},
{x:5320,y:280,taken:false}

];

turtles = [

{x:1500,y:485,w:50,h:35,dir:1},
{x:3000,y:315,w:50,h:35,dir:-1},
{x:5000,y:285,w:50,h:35,dir:1},
{x:6500,y:185,w:50,h:35,dir:-1}

];

finish = {
x:7700,
y:520,
w:50,
h:100
};

}

function nextLevel(){

level++;

player.x = 100;
player.y = 300;

if(level === 2){

loadLevel2();

}
else if(level === 3){

loadLevel3();

}
else{

gameWon = true;

}

}

let trees = [];

for(
let i=0;
i<80;
i++
){

trees.push({

x:i*120+
Math.random()*50,

y:450,

h:180

});

}

function update(){

if(gameWon) return;

if(keys["ArrowRight"]){

player.dx =
player.speed;

}
else if(keys["ArrowLeft"]){

player.dx =
-player.speed;

}
else{

player.dx = 0;

}

player.dy += gravity;

player.x += player.dx;

player.y += player.dy;
for(let p of platforms){

if(
player.x < p.x+p.w &&
player.x+player.w > p.x &&
player.y < p.y+p.h &&
player.y+player.h > p.y
){

if(player.dy >= 0){

player.y =
p.y-player.h;

player.dy = 0;

player.jumps =
player.maxJumps;

}

}

}

for(let coin of coins){

if(
!coin.taken &&
player.x < coin.x+20 &&
player.x+player.w > coin.x &&
player.y < coin.y+20 &&
player.y+player.h > coin.y
){

coin.taken = true;

score += 10;

}

}

for(let t of turtles){

t.x += 1.5 * t.dir;

if(t.x > worldWidth-300){

t.dir = -1;

}

if(t.x < 300){

t.dir = 1;

}

if(
player.x < t.x+t.w &&
player.x+player.w > t.x &&
player.y < t.y+t.h &&
player.y+player.h > t.y
){

hearts--;

player.x = 100;
player.y = 300;

}

}

cameraX =
player.x -
canvas.width/2;

if(cameraX < 0){

cameraX = 0;

}

if(
cameraX >
worldWidth -
canvas.width
){

cameraX =
worldWidth -
canvas.width;

}

if(hearts <= 0){

hearts = 3;

score = 0;

level = 1;

player.x = 100;
player.y = 300;

loadLevel1();

}

if(player.x > finish.x){

nextLevel();

}

}

function draw(){

ctx.fillStyle =
"#87CEEB";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.save();

ctx.translate(
-cameraX,
0
);

for(let p of platforms){

ctx.fillStyle =
"#6B8E23";

ctx.fillRect(
p.x,
p.y,
p.w,
p.h
);

}

for(let coin of coins){

if(!coin.taken){

ctx.fillStyle =
"gold";

ctx.beginPath();

ctx.arc(
coin.x,
coin.y,
12,
0,
Math.PI*2
);

ctx.fill();

}

}

for(let t of turtles){

ctx.fillStyle =
"#2E8B57";

ctx.fillRect(
t.x,
t.y,
t.w,
t.h
);

}

ctx.fillStyle =
"#FFD700";

ctx.fillRect(
finish.x,
finish.y,
8,
finish.h
);

ctx.fillStyle =
"red";

ctx.fillRect(
finish.x+8,
finish.y,
45,
25
);

ctx.fillStyle =
"#1E90FF";

ctx.fillRect(
player.x,
player.y,
player.w,
player.h
);

ctx.restore();

ctx.fillStyle =
"white";

ctx.font =
"28px Arial";

ctx.fillText(
"Score: " + score,
20,
40
);

ctx.fillText(
"❤️ " + hearts,
20,
80
);

ctx.fillText(
"Level: " + level,
20,
120
);

if(gameWon){

ctx.fillStyle =
"rgba(0,0,0,0.8)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle =
"yellow";

ctx.font =
"64px Arial";

ctx.fillText(
"YOU WIN!",
420,
300
);

ctx.font =
"32px Arial";

ctx.fillStyle =
"white";

ctx.fillText(
"Congratulations!",
430,
380
);

}

}

function gameLoop(){

update();

draw();

requestAnimationFrame(
gameLoop
);

}

gameLoop();

</script>
</body>
</html>
